name: cloud-compiler

# Simplified strampler-friendly build: mirrors the working draft-release.yml
# (espressif/esp-idf-ci-action @ v5.1.4) instead of the bit-rotted two-build
# esp-idf-action dance, which used an IDF older than TBD's >=5.1.1 requirement.
on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Firmware platform (strampler / mk1 / mk2 / aem / bba).'
        required: true
        default: 'strampler'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Select platform config
        run: cp "sdkconfig.defaults.${{ github.event.inputs.platform }}" sdkconfig.defaults

      - name: esp-idf build
        uses: espressif/esp-idf-ci-action@v1.1.0
        with:
          esp_idf_version: v5.1.4
          target: esp32
          command: idf.py update-dependencies build

      - name: Archive binaries
        run: |
          zip --junk-paths binaries build/*.bin build/bootloader/*.bin build/partition_table/*.bin

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: Custom tbd firmware
          path: ./binaries.zip
