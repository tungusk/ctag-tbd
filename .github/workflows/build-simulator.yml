# Build Simulator — compile-check the desktop simulator on Ubuntu and run
# the portable rack-lint smoke test.  Catches build breakage from
# simulator/, components/, or rack-registry/synthdefinitions drift on any
# PR or push that touches those paths.
#
# What this DOES check:
#   * `tbd-sim`, `load-test`, `routing-test`, `rack-lint` all build cleanly
#     on Linux GCC (catches transitive-include / macOS-only assumptions)
#   * `./rack-lint` runs and the runtime voice registry matches the
#     contents of sdcard_image/factory/synthdefinitions.json
#   * `./tbd-sim --help` runs without crashing (smoke check on the linked
#     binary)
#
# What this does NOT check:
#   * `./routing-test`'s phase-3 audio fingerprint — that's byte-equality
#     on formatted floats and drifts between Linux GCC and Apple clang at
#     the bit level. Until the comparator is tolerance-aware, the test
#     stays a *local* (macOS) tool; CI just verifies it links.
#   * macOS-specific build issues (the arm64 + Intel-libjack conflict
#     that PR #18 fixed wouldn't fail on Ubuntu) — those need a
#     contributor on that platform or a maintainer-side macOS runner.
#   * Firmware (ESP-IDF cross-compile) — that's `ci.yml`.
#
# Together with `ci.yml`'s firmware build-check, this job is intended to
# give external contributors fast PR feedback on the most common ways to
# break the simulator without realising it.

name: Build Simulator

on:
  # External contributors PR against `staging`; maintainer pushes to both.
  pull_request:
    branches: [dada-tbd-master, staging]
    paths:
      - "simulator/**"
      - "components/**"
      - "sdcard_image/factory/synthdefinitions.json"
      - "sdcard_image/factory/plugins/**"
      - ".github/workflows/build-simulator.yml"

  push:
    branches: [dada-tbd-master, staging]
    paths:
      - "simulator/**"
      - "components/**"
      - "sdcard_image/factory/synthdefinitions.json"
      - "sdcard_image/factory/plugins/**"
      - ".github/workflows/build-simulator.yml"

concurrency:
  group: build-simulator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-simulator:
    name: Build Simulator + headless smoke tests (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake \
            libboost-filesystem-dev libboost-thread-dev libboost-program-options-dev \
            libasound2-dev

      - name: Check out repo (recursive)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Configure (cmake)
        run: |
          cd simulator
          mkdir -p build
          cd build
          cmake ..

      - name: Build (tbd-sim + load-test + routing-test + rack-lint)
        run: |
          cd simulator/build
          make -j"$(nproc)" tbd-sim load-test routing-test rack-lint

      # rack-lint cross-checks the runtime voice registry against
      # synthdefinitions.json — pure text comparison, fully portable.
      - name: rack-lint — voice-registry vs synthdefinitions.json
        run: |
          cd simulator/build
          ./rack-lint

      # routing-test's track→machine map is portable, but its
      # phase-3 audio-fingerprint comparison is byte-equality on
      # formatted floats and drifts between Linux GCC / Apple clang
      # at the bit level. Until the comparator is tolerance-aware
      # we only require that routing-test BUILDS cleanly (covered
      # by the "Build" step above) — we don't gate on running it
      # in CI. Run locally with `./routing-test` for regression
      # detection on intentional topology changes.

      - name: Confirm tbd-sim binary exists + reports help
        run: |
          cd simulator/build
          ls -l tbd-sim
          ./tbd-sim --help | head -20
